name: build-dawn

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
  # TODO: delete this
  #push:
    #branches:
      #- main

jobs:
  info:
    runs-on: ubuntu-24.04
    outputs:
      DAWN_COMMIT: ${{ steps.info.outputs.DAWN_COMMIT }}
      BUILD_DATE: ${{ steps.info.outputs.BUILD_DATE }}
    steps:
      - name: Get Latest Commit Id
        id: info
        run: |
          echo DAWN_COMMIT=`git ls-remote https://dawn.googlesource.com/dawn HEAD | awk '{ print $1 }'` >> ${GITHUB_OUTPUT}
          echo BUILD_DATE=`date +'%Y-%m-%d'` >> ${GITHUB_OUTPUT}

  build:
    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false
      matrix:
        include:
          - os: win
            img: windows-2025
            arch: x64
          - os: win
            img: windows-2025
            arch: arm64
          - os: mac
            img: windows-2025
            arch: arm64

    name: build-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.img }}
    needs: info
    env:
      DAWN_COMMIT: ${{ needs.info.outputs.DAWN_COMMIT }}
      BUILD_DATE: ${{ needs.info.outputs.BUILD_DATE }}
    steps:

      - name: Update XCode
        if: matrix.os == 'mac'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Build Script Cmd
        if: matrix.os == 'win'
        id: build
        shell: cmd
        run: call build.cmd ${{ matrix.arch }}

      - name: Run Build Script Bash
        if: matrix.os != 'win'
        id: build
        shell: bash
        run: bash build.sh ${{ matrix.os }} ${{ matrix.arch }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dawn-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.info.outputs.BUILD_DATE }}
          path: dawn-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.info.outputs.BUILD_DATE }}.zip
          if-no-files-found: error
          compression-level: 0

  release:
    runs-on: ubuntu-24.04
    needs: [info, build]
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:

      - name: Create GitHub Release
        run: |
          echo '[dawn commit](https://dawn.googlesource.com/dawn/+/${{ needs.info.outputs.DAWN_COMMIT }})' >>notes.txt
          gh release create ${{ needs.info.outputs.BUILD_DATE }} -R "${GITHUB_REPOSITORY}" -t '${{ needs.info.outputs.BUILD_DATE }}' -F notes.txt

      - name: Get Artifacts From Build Steps
        uses: actions/download-artifact@v8
        with:
          pattern: dawn-*-${{ needs.info.outputs.BUILD_DATE }}
          merge-multiple: true

      - name: Upload Artifacts to GitHub Release
        run: gh release upload '${{ needs.info.outputs.BUILD_DATE }}' dawn-*-${{ needs.info.outputs.BUILD_DATE }}.zip -R "${GITHUB_REPOSITORY}"
